<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#faf8f3;--paper2:#f4f1e8;--paper3:#ede9dc;
  --ink:#2a2720;--ink2:#6b6459;--ink3:#a8a094;

}
body{font-family:var(--font);background:var(--paper);color:var(--ink);line-height:1.6;min-height:100dvh}
body.desktop{background:rgba(200,190,170,.35);backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);display:flex;align-items:flex-start;justify-content:center}

#hd{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1.5px solid var(--rule2);background:var(--paper);position:sticky;top:0;z-index:50;user-select:none}
#hd-title{font-size:15px;font-weight:700;letter-spacing:-.4px;flex:1}

#slim-btn:hover{background:var(--paper3)}
.slim #view-tabs,.slim #composer,.slim #memo-list,.slim #demo-banner{display:none!important}
.slim #hd{border-bottom:none}
.desktop.slim #wrap,.tablet.slim #wrap{min-height:unset;height:auto}
#view-tabs{display:flex;border-bottom:1px solid var(--rule);background:var(--paper2);padding:0 14px;flex-shrink:0}
.vtab{padding:8px 13px;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.vtab.on{color:var(--accent);border-bottom-color:var(--accent)}
#composer{border-bottom:1.5px solid var(--rule2);background:var(--paper);padding:10px 14px;flex-shrink:0}
#compose-box{width:100%;font-family:var(--font);font-size:13.5px;color:var(--ink);background:transparent;border:none;outline:none;resize:none;line-height:1.65;min-height:48px;max-height:160px}
#compose-box::placeholder{color:var(--ink3)}
#compose-tools{display:flex;align-items:center;gap:6px;margin-top:8px;border-top:1px solid var(--rule);padding-top:8px}
.ct-btn{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--ink2);background:var(--paper2);border:1px solid var(--rule2);border-radius:6px;padding:5px 9px;cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap}
.ct-btn:hover{background:var(--paper3);color:var(--ink)}
.ct-primary{margin-left:auto;background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.ct-primary:hover{opacity:.88}
#att-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ap-item{display:flex;align-items:center;gap:5px;background:var(--paper2);border:1px solid var(--rule2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--ink2);max-width:180px;overflow:hidden}
.ap-item img{width:24px;height:24px;object-fit:cover;border-radius:3px;flex-shrink:0}
.ap-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ap-del{cursor:pointer;color:var(--ink3);font-size:11px;margin-left:auto;flex-shrink:0;padding:0 2px}

.memo-item{border-bottom:1px solid var(--rule);padding:11px 14px 10px;transition:background .15s}
.memo-item:hover{background:rgba(0,0,0,.015)}
.memo-item.editing{background:rgba(61,110,232,.04);border-left:2px solid var(--accent);padding-left:12px}
.mi-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.mi-num{font-size:10px;font-weight:700;color:var(--ink3);background:var(--paper2);padding:1px 6px;border-radius:4px;border:1px solid var(--rule2);flex-shrink:0}
.mi-ts{font-size:10px;color:var(--ink3);flex:1}
.mi-actions{display:flex;gap:3px}
.mi-btn{width:24px;height:24px;background:none;border:1px solid transparent;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--ink3)}
.mi-btn:hover{background:var(--paper2);border-color:var(--rule2);color:var(--ink)}
.mi-btn.done-btn:hover{color:var(--green);background:var(--green-bg)}
.mi-btn.del-btn:hover{color:var(--red);background:var(--red-bg)}
.mi-btn.restore-btn:hover,.mi-btn.edit-btn:hover{color:var(--accent);background:var(--accent-bg)}
.mi-title{font-size:13.5px;font-weight:700;color:var(--ink);word-break:break-word;line-height:1.45;margin-bottom:2px}
.mi-title.done-text{text-decoration:line-through;color:var(--ink3)}
.mi-sub{font-size:12.5px;color:var(--ink2);line-height:1.65;word-break:break-word;white-space:pre-wrap;margin-top:1px}
.mi-sub.done-text{text-decoration:line-through;color:var(--ink3)}
.mi-attaches{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.att-img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--rule2);cursor:pointer}
.att-link{display:flex;align-items:center;gap:5px;background:var(--accent-bg);border:1px solid rgba(61,110,232,.2);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--accent);text-decoration:none;max-width:220px;overflow:hidden}
.att-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-area{width:100%;background:transparent;border:none;border-bottom:1px solid var(--rule2);color:var(--ink);font-family:var(--font);font-size:13.5px;line-height:1.7;resize:none;outline:none;padding:2px 0 4px;margin:2px 0 4px}
.edit-area:focus{border-bottom-color:var(--accent)}
.edit-toolbar{display:flex;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--rule);flex-wrap:wrap}
.et-btn{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--ink2);background:var(--paper2);border:1px solid var(--rule2);border-radius:6px;padding:4px 8px;cursor:pointer;font-family:var(--font);transition:background .12s}
.et-btn:hover{background:var(--paper3)}
.et-save{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;margin-left:auto}
.et-cancel{color:var(--ink3)}
.edit-att-wrap{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0}
.empty{text-align:center;padding:48px 24px;color:var(--ink3);font-size:13px;line-height:2.2}
.empty-icon{font-size:32px;display:block;margin-bottom:8px;opacity:.4}
#img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;cursor:zoom-out}
#img-viewer.show{display:flex}
#img-viewer img{max-width:94vw;max-height:90vh;border-radius:8px}

</style>

<body>
<div id="wrap">
  <div id="hd">
    <div id="hd-title">메모 ♡</div>
    <div class="hd-meta"><span id="hd-date"></span><span id="hd-clock"></span></div>
    <div id="sync-badge">LOCAL</div>
    <button id="slim-btn" onclick="toggleSlim()" title="최소화">&#x2500;</button>
  </div>
  <div id="demo-banner">&#9888; Firebase 미설정 &#8212; 이 기기에만 저장</div>
  <div id="view-tabs">
    <div class="vtab on" data-v="active" onclick="setView('active')">진행 <span id="cnt-active"></span></div>
    <div class="vtab" data-v="archive" onclick="setView('archive')">완료 <span id="cnt-archive"></span></div>
  </div>

    <textarea id="compose-box" rows="2" placeholder="제목 (첫 줄) · 상세내용은 줄바꿈 후..."

      <button class="ct-btn" onclick="document.getElementById('file-img').click()">&#128247; 사진 (복수)</button>

  <img id="viewer-img" src="">

<input type="file" id="file-img" accept="image/*" multiple style="display:none" onchange="onImgFile(event)">

<script type="module">
import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = ts => {
  const d = new Date(ts), p = n => String(n).padStart(2,'0');
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${wd}) ${p(d.getHours())}:${p(d.getMinutes())}`;
};

let memos = [], draftAtts = [], view = 'active';
let fbDb = null, fbRef = null;
let editAtts = [], editingId = null;

// 기기 감지
const isPhone = /iPhone|Android.*Mobile|Mobile.*Android/i.test(navigator.userAgent) && window.innerWidth < 768;
const isTablet = !isPhone && (/iPad|Android/i.test(navigator.userAgent) || (window.innerWidth >= 600 && window.innerWidth < 1200));
document.body.classList.add(isPhone ? 'mobile' : isTablet ? 'tablet' : 'desktop');

// 데모 배너
if (DEMO) $('demo-banner').style.display = 'block';

// 로컬 캐시
function saveLocal() { try { localStorage.setItem('memos_her', JSON.stringify(memos)); } catch(e){} }
function loadLocal() { try { const c = localStorage.getItem('memos_her'); if(c) memos = JSON.parse(c); } catch(e){} }

// Firebase
function setSyncBadge(cls, label) { const b = $('sync-badge'); b.className = cls; b.textContent = label; }

async function persist() {
  saveLocal();
  render();
  if (!fbDb || DEMO) return;
  setSyncBadge('ing', '저장중');
  try { await set(fbRef, memos); setSyncBadge('ok', '동기화됨'); }
  catch(e) { setSyncBadge('err', '오프라인'); }
}

if (!DEMO) {
  try {
    const app = initializeApp(FB);
    fbDb = getDatabase(app);
    fbRef = ref(fbDb, 'memos_her');
    setSyncBadge('ing', '연결중');
    onValue(fbRef, snap => {
      const v = snap.val();
      if (v && Array.isArray(v)) { memos = v; saveLocal(); }
      setSyncBadge('ok', '동기화됨');
      render();
    }, () => { setSyncBadge('err', '오프라인'); loadLocal(); render(); });
  } catch(e) { setSyncBadge('err', 'ERR'); loadLocal(); render(); }
} else { loadLocal(); render(); }

// 시계
function tick() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  $('hd-date').textContent = `${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;
  $('hd-clock').textContent = `${p(d.getHours())}:${p(d.getMinutes())}`;
}
setInterval(tick, 1000); tick();

// 슬림 모드
window.toggleSlim = () => {
  const s = document.body.classList.toggle('slim');
  $('slim-btn').textContent = s ? '\u25A1' : '\u2500';
  localStorage.setItem('memo-slim', s ? '1' : '0');
};
if (localStorage.getItem('memo-slim') === '1') {
  document.body.classList.add('slim');
  const b = $('slim-btn'); if(b) b.textContent = '\u25A1';
}

// 뷰 전환
window.setView = v => {
  view = v;
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('on', t.dataset.v === v));
  $('composer').style.display = v === 'active' ? '' : 'none';
  render();
};

// 렌더
function render() {
  const active  = memos.filter(m => !m.done).reverse();
  const archive = memos.filter(m =>  m.done).reverse();
  $('cnt-active').textContent  = active.length  ? `(${active.length})`  : '';
  $('cnt-archive').textContent = archive.length ? `(${archive.length})` : '';
  const list = $('memo-list');
  const items = view === 'active' ? active : archive;
  if (!items.length) {
    list.innerHTML = `<div class="empty"><span class="empty-icon">${view==='active'?'📋':'📦'}</span>${view==='active'?'메모가 없습니다<br>위에서 새 메모를 작성하세요':'완료된 메모가 없습니다'}</div>`;
    return;
  }
  list.innerHTML = '';
  items.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'memo-item';
    div.dataset.id = m.id;
    div.innerHTML = memoHTML(m, items.length - i);
    list.appendChild(div);
  });
}

function memoHTML(m, num) {
  const isArc = view === 'archive';
  const dc = isArc ? ' done-text' : '';
  const lines = (m.body || '').split('\n');
  const title = esc(lines[0] || '');
  const sub   = esc(lines.slice(1).join('\n').trim());
  const attHtml = (m.attaches||[]).map(a => {
    if (a.type === 'image') return `<img class="att-img" src="${esc(a.url)}" onclick="openImg('${esc(a.url)}')" loading="lazy">`;
    return `<a class="att-link" href="${esc(a.url)}" target="_blank" rel="noopener"><span>${a.type==='google'?'🔗':'🌐'}</span><span>${esc(a.name)}</span></a>`;
  }).join('');

  const editBtn = `<button class="mi-btn edit-btn" onclick="startEdit('${m.id}');event.stopPropagation()" title="편집">✏</button>`;
  const actions = isArc
    ? `${editBtn}<button class="mi-btn restore-btn" onclick="restoreMemo('${m.id}');event.stopPropagation()" title="되돌리기">↩</button><button class="mi-btn del-btn" onclick="delMemo('${m.id}');event.stopPropagation()" title="삭제">🗑</button>`
    : `${editBtn}<button class="mi-btn done-btn" onclick="doneMemo('${m.id}');event.stopPropagation()" title="완료">✓</button><button class="mi-btn del-btn" onclick="delMemo('${m.id}');event.stopPropagation()" title="삭제">🗑</button>`;

  return `
    <div class="mi-head">
      <span class="mi-num">#${num}</span>
      <span class="mi-ts">${fmtDate(m.ts)}</span>
      <div class="mi-actions">${actions}</div>
    </div>
    <div class="mi-title${dc}">${title}</div>
    ${sub ? `<div class="mi-sub${dc}">${sub}</div>` : ''}
    ${attHtml ? `<div class="mi-attaches">${attHtml}</div>` : ''}`;
}

// 저장
window.saveMemo = () => {
  const body = $('compose-box').value.trim();
  if (!body && draftAtts.length === 0) return;
  memos.push({ id:uid(), ts:Date.now(), body, attaches:[...draftAtts], done:false, doneTs:null });
  draftAtts = [];
  $('compose-box').value = '';
  $('compose-box').style.height = '';
  $('att-preview').innerHTML = '';
  persist();
};

window.handleKey = e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveMemo(); } };

// 완료 / 복원 / 삭제
window.doneMemo = id => {
  const m = memos.find(m => m.id === id); if(!m) return;
  m.done = true; m.doneTs = Date.now(); persist();
};
window.restoreMemo = id => {
  const m = memos.find(m => m.id === id); if(!m) return;
  m.done = false; m.doneTs = null; persist();
};
window.delMemo = id => {
  if (!confirm('이 메모를 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== id); persist();
};

// 첨부 - 입력창
window.addLink = type => {
  const url = prompt(type === 'google' ? 'Google Drive/Docs 링크를 붙여넣으세요' : '웹 주소(URL)를 입력하세요');
  if (!url || !url.trim()) return;
  const u = url.trim().startsWith('http') ? url.trim() : 'https://' + url.trim();
  let name = u; try { name = new URL(u).hostname.replace('www.',''); } catch(e){}
  draftAtts.push({ type, url:u, name });
  renderDraftAtts();
};

// 이미지 압축 (최대 800px, quality 0.65)
function compressImg(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

window.onImgFile = async e => {
  const files = Array.from(e.target.files); if(!files.length) return;
  const editId = e.target.dataset.editId || '';
  for (const file of files) {
    const url = await compressImg(file);
    if (editId) { editAtts.push({ type:'image', url, name:file.name }); }
    else { draftAtts.push({ type:'image', url, name:file.name }); }
  }
  if (editId) { renderEditAtts(editId); e.target.dataset.editId = ''; }
  else { renderDraftAtts(); }
  e.target.value = '';
};

function renderDraftAtts() {
  $('att-preview').innerHTML = draftAtts.map((a,i) =>
    `<div class="ap-item">${a.type==='image'?`<img src="${esc(a.url)}">`:''}<span>${esc(a.name)}</span><span class="ap-del" onclick="removeDraftAtt(${i})">✕</span></div>`
  ).join('');
}
window.removeDraftAtt = i => { draftAtts.splice(i,1); renderDraftAtts(); };

// 인라인 편집
window.startEdit = id => {
  if (editingId && editingId !== id) closeEdit(editingId);
  const m = memos.find(m => m.id === id); if(!m) return;
  editAtts = [...(m.attaches||[])];
  editingId = id;
  const el = document.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.classList.add('editing');
  // 기존 요소 숨기기
  ['mi-title','mi-sub','mi-attaches'].forEach(cls => { const e = el.querySelector('.'+cls); if(e) e.style.display='none'; });
  // 편집 UI 삽입
  const d = document.createElement('div'); d.className = 'edit-wrap';
  d.innerHTML = `
    <textarea class="edit-area" id="ea-${id}" rows="3" placeholder="첫 줄이 제목...">${m.body}</textarea>
    <div class="edit-att-wrap" id="eaw-${id}"></div>
    <div class="edit-toolbar">
      <button class="et-btn" onclick="editAddImg('${id}')">📷 사진</button>
      <button class="et-btn" onclick="editAddLink('${id}','google')">🔗 구글</button>
      <button class="et-btn" onclick="editAddLink('${id}','web')">🌐 링크</button>
      <button class="et-btn et-cancel" onclick="closeEdit('${id}')">취소</button>
      <button class="et-btn et-save" onclick="saveEdit('${id}')">저장</button>
    </div>`;
  el.appendChild(d);
  const ta = document.getElementById('ea-'+id);
  ta.style.height = Math.max(ta.scrollHeight, 60) + 'px';
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.max(ta.scrollHeight, 60)+'px'; });
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
  renderEditAtts(id);
  $('file-img').dataset.editId = id;
};

function renderEditAtts(id) {
  const el = document.getElementById('eaw-'+id); if(!el) return;
  el.innerHTML = editAtts.map((a,i) =>
    `<div class="ap-item">${a.type==='image'?`<img src="${esc(a.url)}">`:''}<span>${a.type==='google'?'🔗 ':'🌐 '}${esc(a.name)}</span><span class="ap-del" onclick="editRemAtt(${i},'${id}')">✕</span></div>`
  ).join('');
}
window.editRemAtt = (i, id) => { editAtts.splice(i,1); renderEditAtts(id); };
window.editAddImg = id => { $('file-img').dataset.editId = id; $('file-img').click(); };
window.editAddLink = (id, type) => {
  const url = prompt(type==='google'?'Google 링크':'웹 주소'); if(!url||!url.trim()) return;
  const u = url.trim().startsWith('http') ? url.trim() : 'https://'+url.trim();
  let name=u; try{name=new URL(u).hostname.replace('www.','')}catch(e){}
  editAtts.push({type,url:u,name}); renderEditAtts(id);
};
window.saveEdit = id => {
  const ta = document.getElementById('ea-'+id); if(!ta) return;
  const m = memos.find(m => m.id === id); if(!m) return;
  m.body = ta.value.trim() || m.body;
  m.attaches = [...editAtts];
  m.edited = Date.now();
  closeEdit(id);
  persist();
};
window.closeEdit = id => {
  editingId = null;
  const el = document.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.classList.remove('editing');
  ['mi-title','mi-sub','mi-attaches'].forEach(cls => { const e = el.querySelector('.'+cls); if(e) e.style.display=''; });
  const w = el.querySelector('.edit-wrap'); if(w) w.remove();
};

// 이미지 뷰어
window.openImg = url => { $('viewer-img').src = url; $('img-viewer').classList.add('show'); };

// 자동 높이
window.autoGrow = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160)+'px'; };
</script>
</body>
</html>
