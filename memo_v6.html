  const pad = n => String(n).padStart(2,'0');
  const days = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

      render();
    }, () => setSyncBadge('', 'OFFLINE'));
  } catch(e) { setSyncBadge('', 'ERR'); console.error(e); }
} else {
  const c = localStorage.getItem('memos_v5');
  if (c) try { memos = JSON.parse(c); } catch(e){}
}

function saveCacheLocal() {
  try { localStorage.setItem('memos_v5', JSON.stringify(memos)); } catch(e){}
}
async function persist() {
  saveCacheLocal();
  if (!fbDb || DEMO) return;
  setSyncBadge('ing', 'м ҖмһҘмӨ‘');
  try {
    await set(fbRef, memos);
    setSyncBadge('ok', 'лҸҷкё°нҷ”лҗЁ');
  } catch(e) { setSyncBadge('', 'OFFLINE'); }
}

function setSyncBadge(cls, label) {
  const b = $('sync-badge');
  b.className = cls;
  b.textContent = label;
}

/* в”Җв”Җ мӢңкі„ в”Җв”Җ */
function tick() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const days = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
  $('hd-date').textContent = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
  $('hd-clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
setInterval(tick, 1000); tick();

/* в”Җв”Җ л·° м „нҷҳ в”Җв”Җ */
window.setView = v => {
  view = v;
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('on', t.dataset.v === v));
  $('composer').style.display = v === 'active' ? '' : 'none';
  render();
};


/* в”Җв”Җ мҠ¬лҰј лӘЁл“ң нҶ кёҖ в”Җв”Җ */
window.toggleSlim = () => {
  const isSlim = document.body.classList.toggle('slim');
  document.getElementById('slim-toggle').textContent = isSlim ? 'в–Ў' : 'в”Җ';
  localStorage.setItem('memo-slim', isSlim ? '1' : '0');
};
// мҙҲкё° мғҒнғң ліөмӣҗ
if (localStorage.getItem('memo-slim') === '1') {
  document.body.classList.add('slim');
  document.getElementById('slim-toggle').textContent = 'в–Ў';
}

/* в”Җв”Җ л ҢлҚ” в”Җв”Җ */
function render() {
  const active  = memos.filter(m => !m.done).reverse();
  const archive = memos.filter(m =>  m.done).reverse();

  $('cnt-active').textContent  = active.length  ? `(${active.length})`  : '';
  $('cnt-archive').textContent = archive.length ? `(${archive.length})` : '';

  const list = $('memo-list');
  list.innerHTML = '';

  const items = view === 'active' ? active : archive;

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <span class="empty-icon">${view === 'active' ? 'рҹ“Ӣ' : 'рҹ“Ұ'}</span>
      ${view === 'active' ? 'л©”лӘЁк°Җ м—ҶмҠөлӢҲлӢӨ<br>мң„м—җм„ң мғҲ л©”лӘЁлҘј мһ‘м„ұн•ҳм„ёмҡ”' : 'мҷ„лЈҢлҗң л©”лӘЁк°Җ м—ҶмҠөлӢҲлӢӨ'}
    </div>`;
    return;
  }

  items.forEach((m, i) => {
    const num = view === 'active' ? active.length - i : archive.length - i;
    const div = document.createElement('div');
    div.className = 'memo-item';
    div.dataset.id = m.id;
    div.innerHTML = memoHTML(m, num);
    list.appendChild(div);
  });
}

function memoHTML(m, num) {
  const attHtml = (m.attaches||[]).map(a => {
    if (a.type === 'image') {
      return `<img class="att-img" src="${escH(a.url)}" loading="lazy"
        onclick="openImg('${escH(a.url)}')" title="нҒҙлҰӯн•ҳл©ҙ нҒ¬кІҢ лҙ…лӢҲлӢӨ">`;
    }
    return `<a class="att-link" href="${escH(a.url)}" target="_blank" rel="noopener">
      <span>${a.type==='google'?'рҹ”—':'рҹҢҗ'}</span>
      <span>${escH(a.name||a.url)}</span>
    </a>`;
  }).join('');

  const isArchive = view === 'archive';
  const actions = isArchive
    ? `<button class="mi-btn restore-btn" onclick="restoreMemo('${m.id}')" title="лҗҳлҸҢлҰ¬кё°">вҶ©</button>
       <button class="mi-btn del-btn"     onclick="deleteMemo('${m.id}')"  title="мҳҒкө¬мӮӯм ң">рҹ—‘</button>`
    : `<button class="mi-btn edit-btn"    onclick="startEdit('${m.id}');event.stopPropagation()" title="нҺём§‘">вңҸ</button>
       <button class="mi-btn done-btn"    onclick="doneMemo('${m.id}');event.stopPropagation()"    title="мҷ„лЈҢмІҳлҰ¬">вң“</button>
       <button class="mi-btn del-btn"     onclick="deleteMemo('${m.id}');event.stopPropagation()"  title="мӮӯм ң">рҹ—‘</button>`;

  return `
  <div class="mi-head" data-id="${m.id}">
    <span class="mi-num">#${num}</span>
    <span class="mi-ts">${fmtDate(m.ts)}</span>
    <div class="mi-actions">${actions}</div>
  </div>
  <div class="mi-body${isArchive?' done-text':''}">${escH(m.body)}</div>
  ${attHtml ? `<div class="mi-attaches">${attHtml}</div>` : ''}`;
}



/* в”Җв”Җ мҠ¬лҰј лӘЁл“ң (н—ӨлҚ”л§Ң) в”Җв”Җ */

/* в”Җв”Җ мқёлқјмқё нҺём§‘ в”Җв”Җ */
let editAttaches = [];  // нҺём§‘ мӨ‘ мІЁл¶Җ

window.startEdit = id => {
  // лӢӨлҘё нҺём§‘ мӨ‘мқё н•ӯлӘ© лЁјм Җ лӢ«кё°
  document.querySelectorAll('.memo-item.editing').forEach(el => {
    const cancelId = el.dataset.id;
    if (cancelId && cancelId !== id) cancelEditEl(el);
  });

  const m = memos.find(m => m.id === id);
  if (!m) return;
  editAttaches = [...(m.attaches||[])];

  const itemEl = document.querySelector(`[data-id="${id}"]`);
  if (!itemEl) return;
  itemEl.classList.add('editing');

  // ліёл¬ёмқ„ textareaлЎң көҗмІҙ
  const bodyEl = itemEl.querySelector('.mi-body');
  bodyEl.style.display = 'none';

  // мІЁл¶Җ мҳҒм—ӯ мҲЁкё°кё°
  const attEl = itemEl.querySelector('.mi-attaches');
  if (attEl) attEl.style.display = 'none';

  // нҺём§‘ UI мӮҪмһ…
  const editDiv = document.createElement('div');
  editDiv.className = 'edit-container';
  editDiv.innerHTML = `
    <textarea class="edit-area" id="ea-${id}" rows="3">${escH(m.body)}</textarea>
    <div class="edit-attach-preview" id="eap-${id}"></div>
    <div class="edit-toolbar">
      <button class="et-btn" onclick="editAddImg('${id}')">рҹ“· мӮ¬м§„</button>
      <button class="et-btn" onclick="editAddLink('${id}','google')">рҹ”— кө¬кёҖ</button>
      <button class="et-btn" onclick="editAddLink('${id}','web')">рҹҢҗ л§ҒнҒ¬</button>
      <button class="et-btn cancel-edit" onclick="cancelEdit('${id}')">м·ЁмҶҢ</button>
      <button class="et-btn save-edit" onclick="saveEdit('${id}')">м ҖмһҘ</button>
    </div>`;
  bodyEl.insertAdjacentElement('afterend', editDiv);

  // textarea мһҗлҸҷ лҶ’мқҙ
  const ta = document.getElementById('ea-'+id);
  ta.style.height = 'auto';
  ta.style.height = Math.max(ta.scrollHeight, 60) + 'px';
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.max(ta.scrollHeight, 60) + 'px';
  });
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  renderEditAttaches(id);

  // нҢҢмқј мһ…л Ҙ мқҙлІӨнҠё м—°кІ°
  document.getElementById('file-input-img').dataset.editId = id;
};

function renderEditAttaches(id) {
  const el = document.getElementById('eap-'+id);
  if (!el) return;
  el.innerHTML = editAttaches.map((a, i) => {
    if (a.type === 'image') {
      return `<div class="ap-item">
        <img src="${escH(a.url)}" style="width:28px;height:28px;object-fit:cover;border-radius:3px">
        <span>${escH(a.name||'мӮ¬м§„')}</span>
        <span class="att-del" onclick="editRemoveAttach(${i},'${id}')">вң•</span>
      </div>`;
    }
    return `<div class="ap-item">
      <span>${a.type==='google'?'рҹ”—':'рҹҢҗ'}</span>
      <span>${escH(a.name||a.url)}</span>
      <span class="att-del" onclick="editRemoveAttach(${i},'${id}')">вң•</span>
    </div>`;
  }).join('');
}

window.editRemoveAttach = (i, id) => {
  editAttaches.splice(i, 1);
  renderEditAttaches(id);
};

window.editAddImg = id => {
  document.getElementById('file-input-img').dataset.editId = id;
  document.getElementById('file-input-img').click();
};

window.editAddLink = (id, type) => {
  const placeholder = type === 'google' ? 'Google Drive / Docs л§ҒнҒ¬' : 'мӣ№ мЈјмҶҢ(URL)';
  const url = prompt(placeholder);
  if (!url || !url.trim()) return;
  const u = url.trim().startsWith('http') ? url.trim() : 'https://' + url.trim();
  let name = u;
  try { name = new URL(u).hostname.replace('www.',''); } catch(e){}
  editAttaches.push({ type, url: u, name });
  renderEditAttaches(id);
};

window.saveEdit = id => {
  const ta = document.getElementById('ea-'+id);
  if (!ta) return;
  const m = memos.find(m => m.id === id);
  if (!m) return;
  m.body = ta.value.trim() || m.body;
  m.attaches = [...editAttaches];
  m.edited = Date.now();
  closeEditUI(id);
  persist();
  render();
};

window.cancelEdit = id => {
  closeEditUI(id);
};

function closeEditUI(id) {
  const itemEl = document.querySelector(`[data-id="${id}"]`);
  if (!itemEl) return;
  cancelEditEl(itemEl);
}

function cancelEditEl(itemEl) {
  itemEl.classList.remove('editing');
  const bodyEl = itemEl.querySelector('.mi-body');
  if (bodyEl) bodyEl.style.display = '';
  const attEl = itemEl.querySelector('.mi-attaches');
  if (attEl) attEl.style.display = '';
  const editContainer = itemEl.querySelector('.edit-container');
  if (editContainer) editContainer.remove();
}

/* в”Җв”Җ л©”лӘЁ м ҖмһҘ в”Җв”Җ */
window.saveMemo = () => {
  const body = $('compose-box').value.trim();
  if (!body && draft.attaches.length === 0) return;
  const m = {
    id:       uid(),
    ts:       Date.now(),
    body:     body,
    attaches: [...draft.attaches],
    done:     false,
    doneTs:   null
  };
  memos.push(m);
  draft.attaches = [];
  $('compose-box').value = '';
  $('compose-box').style.height = '';
  $('attach-preview').innerHTML = '';
  persist();
  render();
};

window.handleComposeSend = e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveMemo(); }
};

/* в”Җв”Җ мҷ„лЈҢ / ліөмӣҗ / мӮӯм ң в”Җв”Җ */
window.doneMemo = id => {
  const m = memos.find(m => m.id === id);
  if (m) { m.done = true; m.doneTs = Date.now(); persist(); render(); }
};
window.restoreMemo = id => {
  const m = memos.find(m => m.id === id);
  if (m) { m.done = false; m.doneTs = null; persist(); render(); }
};
window.deleteMemo = id => {
  if (!confirm('мқҙ л©”лӘЁлҘј мҳҒкө¬ мӮӯм ңн• к№Ңмҡ”?')) return;
  memos = memos.filter(m => m.id !== id);
  persist(); render();
};

/* в”Җв”Җ мІЁл¶Җ: мқҙлҜём§Җ в”Җв”Җ */
window.attachImage = e => {
  const file = e.target.files[0]; if (!file) return;
  const editId = e.target.dataset.editId;
  const reader = new FileReader();
  reader.onload = ev => {
    const url = ev.target.result;
    if (editId) {
      editAttaches.push({ type:'image', url, name: file.name });
      renderEditAttaches(editId);
      e.target.dataset.editId = '';
    } else {
      draft.attaches.push({ type:'image', url, name: file.name });
      renderPreview();
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
};

/* в”Җв”Җ мІЁл¶Җ: л§ҒнҒ¬ в”Җв”Җ */
window.promptLink = type => {
  const placeholder = type === 'google'
    ? 'Google Drive / Docs л§ҒнҒ¬лҘј л¶ҷм—¬л„Јмңјм„ёмҡ”'
    : 'мӣ№ мЈјмҶҢ(URL)лҘј мһ…л Ҙн•ҳм„ёмҡ”';
  const url = prompt(placeholder);
  if (!url || !url.trim()) return;
  const u = url.trim().startsWith('http') ? url.trim() : 'https://' + url.trim();
  let name = u;
  try { name = new URL(u).hostname.replace('www.',''); } catch(e){}
  draft.attaches.push({ type, url: u, name });
  renderPreview();
};

function renderPreview() {
  $('attach-preview').innerHTML = draft.attaches.map((a, i) => {
    if (a.type === 'image') {
      return `<div class="ap-item">
        <img src="${escH(a.url)}" alt="">
        <span>${escH(a.name)}</span>
        <span class="ap-del" onclick="removeAttach(${i})">вң•</span>
      </div>`;
    }
    return `<div class="ap-item">
      <span>${a.type==='google'?'рҹ”—':'рҹҢҗ'}</span>
      <span>${escH(a.name)}</span>
      <span class="ap-del" onclick="removeAttach(${i})">вң•</span>
    </div>`;
  }).join('');
}

window.removeAttach = i => {
  draft.attaches.splice(i, 1);
  renderPreview();
};

/* в”Җв”Җ мқҙлҜём§Җ л·°м–ҙ в”Җв”Җ */
window.openImg = url => {
  $('viewer-img').src = url;
  $('img-viewer').classList.add('show');
};

/* в”Җв”Җ textarea мһҗлҸҷ лҶ’мқҙ в”Җв”Җ */
window.autoGrow = el => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
};

/* в”Җв”Җ мҙҲкё° л ҢлҚ” в”Җв”Җ */
render();
</script>
