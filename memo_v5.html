<script type="module">
import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

/* ── 기기 감지 ── */
const isPhone  = (/iPhone|Android.*Mobile|Mobile.*Android/i.test(navigator.userAgent)) && window.innerWidth < 768;
const isTablet = !isPhone && (/iPad|Android/i.test(navigator.userAgent) || (window.innerWidth >= 600 && window.innerWidth < 1200));
document.body.classList.add(isPhone ? 'mobile' : isTablet ? 'tablet' : 'desktop');

/* ── 유틸 ── */
const $  = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const fmtDate = ts => {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const escH = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ── 상태 ── */
let memos   = [];     // { id, ts, body, attaches:[{type,url,name}], done, doneTs }
let draft   = { attaches: [] };   // 작성 중 첨부
let view    = 'active';   // 'active' | 'archive'
let fbDb    = null, fbRef = null;
let counter = 0;  // 진행 메모 표시 번호용

/* ── 데모 배너 ── */
if (DEMO) $('demo-banner').style.display = 'block';

/* ── Firebase 초기화 ── */
if (!DEMO) {
  try {
    const app = initializeApp(FB);
    fbDb  = getDatabase(app);
    fbRef = ref(fbDb, 'memos_v5');
    setSyncBadge('ing', '연결중');
    onValue(fbRef, snap => {
      const v = snap.val();
      if (v && Array.isArray(v)) { memos = v; saveCacheLocal(); }
      setSyncBadge('ok', '동기화됨');
      render();
    }, () => setSyncBadge('', 'OFFLINE'));
  } catch(e) { setSyncBadge('', 'ERR'); console.error(e); }
} else {
  const c = localStorage.getItem('memos_v5');
  if (c) try { memos = JSON.parse(c); } catch(e){}
}

function saveCacheLocal() {
  try { localStorage.setItem('memos_v5', JSON.stringify(memos)); } catch(e){}
}
async function persist() {
  saveCacheLocal();
  if (!fbDb || DEMO) return;
  setSyncBadge('ing', '저장중');
  try {
    await set(fbRef, memos);
    setSyncBadge('ok', '동기화됨');
  } catch(e) { setSyncBadge('', 'OFFLINE'); }
}

function setSyncBadge(cls, label) {
  const b = $('sync-badge');
  b.className = cls;
  b.textContent = label;
}

/* ── 시계 ── */
function tick() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const days = ['일','월','화','수','목','금','토'];
  $('hd-date').textContent = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
  $('hd-clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
setInterval(tick, 1000); tick();

/* ── 뷰 전환 ── */
window.setView = v => {
  view = v;
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('on', t.dataset.v === v));
  $('composer').style.display = v === 'active' ? '' : 'none';
  render();
};

/* ── 렌더 ── */
function render() {
  const active  = memos.filter(m => !m.done).reverse();
  const archive = memos.filter(m =>  m.done).reverse();

  $('cnt-active').textContent  = active.length  ? `(${active.length})`  : '';
  $('cnt-archive').textContent = archive.length ? `(${archive.length})` : '';

  const list = $('memo-list');
  list.innerHTML = '';

  const items = view === 'active' ? active : archive;

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <span class="empty-icon">${view === 'active' ? '📋' : '📦'}</span>
      ${view === 'active' ? '메모가 없습니다<br>위에서 새 메모를 작성하세요' : '완료된 메모가 없습니다'}
    </div>`;
    return;
  }

  items.forEach((m, i) => {
    const num = view === 'active' ? active.length - i : archive.length - i;
    const div = document.createElement('div');
    div.className = 'memo-item';
    div.innerHTML = memoHTML(m, num);
    list.appendChild(div);
  });
}

function memoHTML(m, num) {
  const attHtml = (m.attaches||[]).map(a => {
    if (a.type === 'image') {
      return `<img class="att-img" src="${escH(a.url)}" loading="lazy"
        onclick="openImg('${escH(a.url)}')" title="클릭하면 크게 봅니다">`;
    }
    return `<a class="att-link" href="${escH(a.url)}" target="_blank" rel="noopener">
      <span>${a.type==='google'?'🔗':'🌐'}</span>
      <span>${escH(a.name||a.url)}</span>
    </a>`;
  }).join('');

  const isArchive = view === 'archive';
  const actions = isArchive
    ? `<button class="mi-btn restore-btn" onclick="restoreMemo('${m.id}')" title="되돌리기">↩</button>
       <button class="mi-btn del-btn"     onclick="deleteMemo('${m.id}')"  title="영구삭제">🗑</button>`
    : `<button class="mi-btn done-btn"    onclick="doneMemo('${m.id}')"    title="완료처리">✓</button>
       <button class="mi-btn del-btn"     onclick="deleteMemo('${m.id}')"  title="삭제">🗑</button>`;

  return `
  <div class="mi-head">
    <span class="mi-num">#${num}</span>
    <span class="mi-ts">${fmtDate(m.ts)}</span>
    <div class="mi-actions">${actions}</div>
  </div>
  <div class="mi-body${isArchive?' done-text':''}">${escH(m.body)}</div>
  ${attHtml ? `<div class="mi-attaches">${attHtml}</div>` : ''}`;
}

/* ── 메모 저장 ── */
window.saveMemo = () => {
  const body = $('compose-box').value.trim();
  if (!body && draft.attaches.length === 0) return;
  const m = {
    id:       uid(),
    ts:       Date.now(),
    body:     body,
    attaches: [...draft.attaches],
    done:     false,
    doneTs:   null
  };
  memos.push(m);
  draft.attaches = [];
  $('compose-box').value = '';
  $('compose-box').style.height = '';
  $('attach-preview').innerHTML = '';
  persist();
  render();
};

window.handleComposeSend = e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveMemo(); }
};

/* ── 완료 / 복원 / 삭제 ── */
window.doneMemo = id => {
  const m = memos.find(m => m.id === id);
  if (m) { m.done = true; m.doneTs = Date.now(); persist(); render(); }
};
window.restoreMemo = id => {
  const m = memos.find(m => m.id === id);
  if (m) { m.done = false; m.doneTs = null; persist(); render(); }
};
window.deleteMemo = id => {
  if (!confirm('이 메모를 영구 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== id);
  persist(); render();
};

/* ── 첨부: 이미지 ── */
window.attachImage = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const url = ev.target.result;
    draft.attaches.push({ type:'image', url, name: file.name });
    renderPreview();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
};

/* ── 첨부: 링크 ── */
window.promptLink = type => {
  const placeholder = type === 'google'
    ? 'Google Drive / Docs 링크를 붙여넣으세요'
    : '웹 주소(URL)를 입력하세요';
  const url = prompt(placeholder);
  if (!url || !url.trim()) return;
  const u = url.trim().startsWith('http') ? url.trim() : 'https://' + url.trim();
  let name = u;
  try { name = new URL(u).hostname.replace('www.',''); } catch(e){}
  draft.attaches.push({ type, url: u, name });
  renderPreview();
};

function renderPreview() {
  $('attach-preview').innerHTML = draft.attaches.map((a, i) => {
    if (a.type === 'image') {
      return `<div class="ap-item">
        <img src="${escH(a.url)}" alt="">
        <span>${escH(a.name)}</span>
        <span class="ap-del" onclick="removeAttach(${i})">✕</span>
      </div>`;
    }
    return `<div class="ap-item">
      <span>${a.type==='google'?'🔗':'🌐'}</span>
      <span>${escH(a.name)}</span>
      <span class="ap-del" onclick="removeAttach(${i})">✕</span>
    </div>`;
  }).join('');
}

window.removeAttach = i => {
  draft.attaches.splice(i, 1);
  renderPreview();
};

/* ── 이미지 뷰어 ── */
window.openImg = url => {
  $('viewer-img').src = url;
  $('img-viewer').classList.add('show');
};

/* ── textarea 자동 높이 ── */
window.autoGrow = el => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
};

/* ── 초기 렌더 ── */
render();
</script>

<script>
// PWA 서비스워커 등록
if ('serviceWorker' in navigator && !window.electronAPI) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
